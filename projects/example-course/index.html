<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCAP 職能導向課程計畫書生成器（雲端直連版）</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 React 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 每個專案專屬設定（PROJECT_NAME、GAS_API_URL）。由 scripts/new-project.sh 產生；template 內僅提供 config.example.js -->
    <script src="./config.js"></script>
    <!-- 選用：真實 GAS 網址可只寫在 config.local.js（已被 .gitignore 排除，不進公開版控）；存在時覆蓋 config.js -->
    <script src="./config.local.js" onerror="void 0"></script>
    <!-- 標竿「100 分」範例資料（供「查看標竿範例」與「一鍵填入標竿範例」使用） -->
    <script src="./exemplar.js" onerror="void 0"></script>

    <style>
        body { background-color: #f3f4f6; }
        .a4-page { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }

        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
            .a4-page { box-shadow: none !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; border: none !important; }
            .print-page-break { page-break-before: always; }
        }
    </style>
</head>
<body class="font-sans text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ------------------------------------------------------------------
        // GAS 部署網址（Google Apps Script Web App /exec URL）
        //
        // 本系統採「直接連線」架構：前端直接以 fetch() 連線 GAS Web App，
        // 由 GAS 讀寫 Google Sheet 作為計畫書內容的儲存後端。
        //
        // 網址優先序：網址參數 ?api= > localStorage(gasApiUrl) > 下方預設值。
        // 若要更換部署網址，可在畫面右上角「變更連線網址」，或改下方常數。
        // ⚠ 若此為敏感資訊，請改以部署時注入或由使用者於畫面輸入，勿寫死於版本控制。
        // ------------------------------------------------------------------
        // 佔位網址：本 repo 為「公開」，嚴禁寫死真實 /exec 部署網址。
        // 真實網址由以下任一方式於「執行期」注入（不進版控）：
        //   1. 網址參數 ?api=...   2. 畫面右上「變更連線網址」(存 localStorage)
        //   3. 同目錄 config.js 內 window.PLAN_BOOK_CONFIG.GAS_API_URL（各專案自建，已被 .gitignore 排除）
        const PLACEHOLDER_GAS_API_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_DEPLOYMENT_ID/exec';
        const PLAN_BOOK_CONFIG = (typeof window !== 'undefined' && typeof window.PLAN_BOOK_CONFIG === 'object' && window.PLAN_BOOK_CONFIG) || {};
        const PROJECT_NAME = PLAN_BOOK_CONFIG.PROJECT_NAME || 'iCAP 職能導向課程計畫書';
        const DEFAULT_GAS_API_URL = PLAN_BOOK_CONFIG.GAS_API_URL || PLACEHOLDER_GAS_API_URL;
        const GAS_API_URL = (new URLSearchParams(window.location.search).get('api'))
            || window.localStorage.getItem('gasApiUrl')
            || DEFAULT_GAS_API_URL;

        // 直接連線 GAS 的共用請求函式（統一走 text/plain 降低 CORS 預檢）
        // 錯誤分類：權限未開放 / 缺 doPost（部署過舊）/ 跨來源(file://) / 一般錯誤
        const callGas = (payload) =>
            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                redirect: 'follow'
            })
            .then(res => {
                if (!res.ok) throw new Error('API 連線失敗 (HTTP ' + res.status + ')');
                return res.text();
            })
            .then(text => {
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    // 後端回傳非 JSON：多半是 GAS 錯誤頁（缺 doPost / 部署版本過舊）或登入頁（權限非「任何人」）
                    if (/doPost|指令碼函式/.test(text)) {
                        throw new Error('後端缺少 doPost 或部署版本過舊：請把最新的 template/gas/Code.gs 貼到 Apps Script，並「重新部署 → 新版本」。');
                    }
                    if (/accounts\.google\.com|ServiceLogin|需要授權|請登入/i.test(text)) {
                        throw new Error('權限未開放（需設為任何人）：Apps Script → 部署 → 編輯 →「誰可以存取」改為「任何人」後重新部署。');
                    }
                    throw new Error('後端回傳非預期內容（可能不是本系統後端，或部署版本過舊）。');
                }
                if (data && data.status === 'error') throw new Error(data.message || '後端回傳錯誤');
                return data;
            })
            .catch(err => {
                // fetch 本身失敗（TypeError）通常代表跨來源被擋或錯誤頁沒有 CORS 標頭
                if (err instanceof TypeError) {
                    throw new Error('無法連線（Failed to fetch）。常見原因：①GAS 部署權限非「任何人」②後端缺 doPost 導致錯誤頁沒有 CORS 標頭 ③以 file:// 開啟被跨來源擋下，請改用 http://localhost:8000/ 開啟。');
                }
                throw err;
            });

        // ------------------------------------------------------------------
        // 職能導向課程品質認證審查指標（ADDIE 五構面 15 項）
        // 來源：data/quality_review/rubric_course_addie.json（id + 短標題）
        // 用於各欄位／對照表旁的「對應指標」標註。
        // ------------------------------------------------------------------
        const RUBRIC_INDICATORS = {
            'A-1':  { dim: '分析 Analyze',   title: '具體職能依據（OCS／職能單元／自行分析）', critical: true },
            'A-2':  { dim: '分析 Analyze',   title: '需求分析與學習者分析完整', critical: true },
            'A-3':  { dim: '分析 Analyze',   title: '課程地圖／學習路徑對應職能單元', critical: true },
            'D-1':  { dim: '設計 Design',    title: '教學目標對應行為指標與職能級別', critical: true },
            'D-2':  { dim: '設計 Design',    title: '課程大綱／單元結構完整（時數、職能對照）', critical: true },
            'D-3':  { dim: '設計 Design',    title: '評量設計於設計階段已規劃', critical: false },
            'DV-1': { dim: '發展 Develop',   title: '教材與教學資源完備', critical: true },
            'DV-2': { dim: '發展 Develop',   title: '師資資格與產業經驗符合要求', critical: true },
            'DV-3': { dim: '發展 Develop',   title: '教學方法與職能內涵類型匹配（K/S/A）', critical: false },
            'I-1':  { dim: '實施 Implement', title: '試教／開課實施紀錄', critical: true },
            'I-2':  { dim: '實施 Implement', title: 'iCAP 平台開課與學員資料登錄流程', critical: false },
            'I-3':  { dim: '實施 Implement', title: '課程總時數 ≥ 12 小時', critical: true },
            'E-1':  { dim: '評估 Evaluate',  title: '評量方式對應教學目標與行為指標', critical: true },
            'E-2':  { dim: '評估 Evaluate',  title: '學習成果證據類型明確', critical: true },
            'E-3':  { dim: '評估 Evaluate',  title: '課程自我管考與持續改善機制', critical: false },
        };

        // ADDIE 各階段欄位／對照表結構（驅動精靈式編輯 UI、完成度計算與預覽）
        // required=true → 顯示「必填」徽章並納入完成度分母。
        // indicator → 對應 RUBRIC_INDICATORS 之 id。
        const ADDIE_SCHEMA = {
            analysis: {
                label: '1. 分析階段 (Analysis)', dim: '分析 Analyze', dimColor: 'rose',
                desc: '交代需求來源、問卷與焦點小組數據，確立職能依據與能力缺口。',
                fields: [
                    { key: 'industryNeed', label: '產業／職業需求驗證與需求來源', rows: 5, required: true, indicator: 'A-2',
                      hint: '標竿隊長：需求要「雙軌」佐證——量化（問卷樣本數、回收率、關鍵痛點百分比）＋質化（產官學焦點小組共識），且可追溯到原始來源。' },
                    { key: 'competencyBasis', label: '具體職能依據（公告 OCS／職能單元代碼／自行職能分析）', rows: 3, required: true, indicator: 'A-1',
                      hint: '標竿隊長：寫出職能基準名稱與代碼、對接之工作任務與職能級別，讓職能來源與課程目標明確連結。' },
                    { key: 'learnerAnalysis', label: '學員先備條件與能力缺口分析', rows: 3, required: true, indicator: 'A-2',
                      hint: '標竿隊長：界定目標族群、先備條件與「缺口」，說明課程如何補足（如重聽說、降讀寫）。' },
                ],
                tables: [
                    { key: 'competencyMapTable', label: '職能基準對應表（能力單元 → 課程）', required: true, indicator: 'A-3',
                      hint: '標竿隊長：CU—課程單元—職能級別需可追溯，這是課程地圖對應職能的關鍵佐證。',
                      columns: [ { key: 'cu', label: '能力單元／工作任務' }, { key: 'course', label: '對應課程單元' }, { key: 'level', label: '職能級別' } ] },
                ],
            },
            design: {
                label: '2. 設計階段 (Design)', dim: '設計 Design', dimColor: 'amber',
                desc: '將痛點轉為可測量學習目標，發展課程地圖與評量藍圖。',
                fields: [
                    { key: 'learningObjectives', label: '學習目標（對應職能行為指標與級別）', rows: 4, required: true, indicator: 'D-1',
                      hint: '標竿隊長：目標須 SMART、可評量，並逐一對應行為指標與職能級別。' },
                    { key: 'assessmentPlan', label: '評量方式規劃（形成性＋總結性）', rows: 3, required: true, indicator: 'D-3',
                      hint: '標竿隊長：於設計階段即畫出評量藍圖（形成性＋總結性、及格門檻、Rubric），避免事後補作。' },
                ],
                tables: [
                    { key: 'courseMapTable', label: '能力單元對應課程地圖表（單元／時數／職能對照）', required: true, indicator: 'D-2',
                      hint: '標竿隊長：單元、時數、對應職能／行為指標要齊全，時數加總須與總時數一致。',
                      columns: [ { key: 'unit', label: '課程單元' }, { key: 'hours', label: '時數' }, { key: 'objective', label: '對應職能／行為指標' } ] },
                ],
            },
            development: {
                label: '3. 發展階段 (Development)', dim: '發展 Develop', dimColor: 'emerald',
                desc: '產出教材、教案、教學方法與師資，並留下專家審查紀錄。',
                fields: [
                    { key: 'materials', label: '教材／教案／數位輔具開發', rows: 4, required: true, indicator: 'DV-1',
                      hint: '標竿隊長：教材需覆蓋所有職能單元；數位化（音檔、QR Code）為加分亮點。' },
                    { key: 'teachingMethods', label: '教學方法與職能內涵類型匹配（K/S/A）', rows: 3, required: true, indicator: 'DV-3',
                      hint: '標竿隊長：依知識/技能/態度配比選教學法（講授、演練、討論），呼應職能內涵。' },
                    { key: 'expertReview', label: '教材試教／專家審查紀錄', rows: 3, required: false, indicator: 'DV-1',
                      hint: '標竿隊長：保留教材與 Rubric 之專家審查會議紀錄，強化可稽核性。' },
                ],
                tables: [
                    { key: 'instructorTable', label: '師資資格對應表（姓名／資格／產業經驗／授課單元）', required: true, indicator: 'DV-2',
                      hint: '標竿隊長：師資須具備職能相符之資格與產業經驗，並附資歷證明對照。',
                      columns: [ { key: 'name', label: '師資／角色' }, { key: 'qualification', label: '資格／專長' }, { key: 'experience', label: '產業／實務經驗' }, { key: 'unit', label: '授課單元' } ] },
                ],
            },
            implementation: {
                label: '4. 實施階段 (Implementation)', dim: '實施 Implement', dimColor: 'sky',
                desc: '規劃開課、學員遴選、實施排程，並知悉平台登錄流程。',
                fields: [
                    { key: 'enrollmentPlan', label: '開課計畫與學員遴選', rows: 4, required: true, indicator: 'I-1',
                      hint: '標竿隊長：交代試辦期程、招生人數上限、遴選管道與品質控管（小班、雙語助教）。' },
                    { key: 'platformProcess', label: 'iCAP 平台開課與學員資料登錄流程', rows: 3, required: false, indicator: 'I-2',
                      hint: '標竿隊長：說明開課前建立班次、留存簽到教案照片、結訓登錄名冊等可稽核流程。' },
                ],
                tables: [
                    { key: 'scheduleTable', label: '實施排程表（日期／單元／時數／師資）', required: true, indicator: 'I-3',
                      hint: '標竿隊長：排程時數加總須 ≥ 12 小時（系統會自動加總檢核）。',
                      columns: [ { key: 'date', label: '日期／週次' }, { key: 'unit', label: '課程單元' }, { key: 'hours', label: '時數' }, { key: 'instructor', label: '授課師資' } ] },
                ],
            },
            evaluation: {
                label: '5. 評估階段 (Evaluation)', dim: '評估 Evaluate', dimColor: 'violet',
                desc: '四層次評量對照、學習成果證據與回饋改善機制。',
                fields: [
                    { key: 'evidenceTypes', label: '學習成果證據類型（作品集／測驗／實作檢核）', rows: 3, required: true, indicator: 'E-2',
                      hint: '標竿隊長：列出可留存備查之證據（錄影、Rubric 正本、及格證明），且能對應行為指標。' },
                    { key: 'improvementMechanism', label: '回饋改善與自我管考機制', rows: 3, required: true, indicator: 'E-3',
                      hint: '標竿隊長：訂定異常觸發條件與滾動式修正流程，形成回饋循環與修訂紀錄。' },
                ],
                tables: [
                    { key: 'kirkpatrickTable', label: '四層次評量對照表（反應／學習／行為／成果）', required: true, indicator: 'E-1',
                      hint: '標竿隊長：每一層次的評量方式與工具須對應教學目標與行為指標，並訂通過標準。',
                      columns: [ { key: 'level', label: '評量層次' }, { key: 'method', label: '評量方式' }, { key: 'tool', label: '評量工具' }, { key: 'threshold', label: '通過／達標標準' } ] },
                ],
            },
        };
        const ADDIE_STAGE_KEYS = ['analysis', 'design', 'development', 'implementation', 'evaluation'];

        // 標竿範例（由 exemplar.js 注入；缺檔時以空物件降級，功能自動隱藏）
        const EXEMPLAR = (typeof window !== 'undefined' && window.PLAN_BOOK_EXEMPLAR) || {};

        // 依 schema 建立單一階段的空白結構（欄位=空字串、對照表=空陣列）
        const emptyStage = (stageKey) => {
            const schema = ADDIE_SCHEMA[stageKey];
            const obj = { narrative: '' };
            schema.fields.forEach(f => { obj[f.key] = ''; });
            schema.tables.forEach(t => { obj[t.key] = []; });
            return obj;
        };
        const emptyAddie = () => {
            const a = {};
            ADDIE_STAGE_KEYS.forEach(k => { a[k] = emptyStage(k); });
            return a;
        };
        // 由標竿範例組出某階段完整內容（供 DEFAULT_DATA 與一鍵填入使用）
        const exemplarStage = (stageKey) => {
            const base = emptyStage(stageKey);
            const ex = EXEMPLAR[stageKey] || {};
            const out = { ...base };
            Object.keys(base).forEach(k => {
                if (ex[k] == null) return;
                out[k] = Array.isArray(base[k]) ? (Array.isArray(ex[k]) ? ex[k].map(r => ({ ...r })) : base[k]) : ex[k];
            });
            return out;
        };
        const exemplarAddie = () => {
            const a = {};
            ADDIE_STAGE_KEYS.forEach(k => { a[k] = exemplarStage(k); });
            return a;
        };

        // 相容化：舊版存檔 addie[stage] 為字串 → 轉為結構物件（字串併入 narrative）；
        // 並補齊缺漏之欄位／對照表，確保 GAS 載入之舊資料可正常 round-trip。
        const normalizeAddie = (addie) => {
            const base = emptyAddie();
            if (!addie || typeof addie !== 'object') return base;
            ADDIE_STAGE_KEYS.forEach(stage => {
                const v = addie[stage];
                if (typeof v === 'string') {
                    base[stage] = { ...base[stage], narrative: v };
                } else if (v && typeof v === 'object') {
                    const merged = { ...base[stage] };
                    Object.keys(base[stage]).forEach(k => {
                        if (v[k] == null) return;
                        if (Array.isArray(base[stage][k])) { if (Array.isArray(v[k])) merged[k] = v[k]; }
                        else merged[k] = v[k];
                    });
                    base[stage] = merged;
                }
            });
            return base;
        };

        // 預設公版範例資料 (經紅、藍、標竿隊長聯合修改版；ADDIE 為標竿 100 分示範)
        const DEFAULT_DATA = {
            basicInfo: {
                courseName: '外籍看護居家照顧華語溝通實務班', industry: '重點缺工產業-長照與跨國勞動力', level: '2', hours: 32,
                targetAudience: '由仲介機構或雇主推薦，甫入台或有在職進修需求之外籍家庭看護工(印尼、越南為主)', competencyCode: 'HRM4301-001 (跨國勞動力仲介從業人員) 及 長照基準',
            },
            proposalDetails: {
                background: '一、社會環境與產業缺口 (SDGs對接)\n臺灣邁入超高齡社會，依據國家發展委員會推估，至 2026 年老年人口將突破 21%。在少子化與家庭結構改變的衝擊下，外籍家庭看護工已成為我國長照體系核心人力。本計畫響應 SDGs 3 (健康與福祉) 及勞動部「移工留用政策」，致力提升照護品質。\n\n二、實務痛點分析\n多數外籍看護工初次入臺時，常面臨「聽不懂雇主指令」、「無法準確傳達生理需求」及「無法正確辨識醫療資訊」等三大挑戰，衍生照護疏失甚至醫患糾紛。\n\n三、對接政策與職能\n本計畫深入對接「跨國勞動力仲介從業人員」職能基準。透過 iCAP 發展模式，精準萃取第一線居家照護所需之「華語溝通實務職能」，解決日常照護與緊急應變之溝通痛點。',
                objectives: '【質化目標】\n1. 建構標準化教學模組：開發符合 iCAP 規範之「做中學」雙語教材，並建立客觀之情境實作評量機制，翻轉傳統填鴨式語文教學。\n2. 數位輔助學習：開發線上情境聽力模擬音檔(QR Code)，突破時空限制，提升學習留存率。\n3. 提升跨文化適應力：協助外籍看護理解臺灣家庭照護文化，減少勞雇摩擦。\n\n【量化目標】\n1. 課程開發：完成 32 小時職能導向課程大綱、多媒體教材及評量工具開發。\n2. 試辦教學：預計於 115 年第 3 季辦理 1 場次試辦教學，培育至少 20 名外籍看護。\n3. 學習成效：參訓學員結訓實作評量（L2）通過率達 80% 以上；學員滿意度（L1）平均達 4.0 分（滿分 5 分）以上方為達標。',
                benefits: '一、 對參訓學員：\n降低語言焦慮，提升在臺工作適應力。具備基礎照護華語能力，能正確執行指令，並強化緊急狀況應變能力，保障自身及被照顧者安全。\n\n二、 對雇主家庭：\n減少溝通不良產生之誤解。確保被照顧者之生理需求能被正確處理，提升居家照護品質，減輕家屬壓力。\n\n三、 對產業發展與社會：\n提供一套具國家公信力（iCAP 認證）之訓練模組。響應政府「留用優秀外國中階技術人力」政策，穩定長照人力供給，帶動整體產業服務品質升級。',
                prerequisites: '1. 基本條件：已合法入臺，並從事家庭看護工作滿一個月以上者。\n2. 語言能力：具備基礎母語（印尼語或越南語）讀寫能力，無須具備華語基礎。\n3. 實務經驗：具備基礎居家照護經驗者。\n4. 報名管道：透過直聘中心、仲介公司推薦，或雇主同意放假參訓者優先錄取。',
            },
            addie: exemplarAddie(),
            syllabus: [

                { unit: '單元二：就醫配合與醫囑聽解', hours: 8, method: '講述法、實物展示(藥袋)、情境模擬', objective: '能聽懂醫院診間的基本護理衛教，並正確識別中文藥袋資訊。', indicators: '1. 能正確圈選/指出藥袋上「飯前、飯後、睡前」與「服藥劑量」等關鍵字。\n2. 能聽懂並正確操作護理人員指示之傷口照護動作(如:擦藥膏、貼紗布)。\n3. 能向雇主正確轉述(或利用圖卡指認)醫師診斷的主要病況(如:發燒、血壓高)。' },
                { unit: '單元三：突發狀況與緊急通報', hours: 8, method: '情境模擬、電話實作演練', objective: '在面臨跌倒、昏迷等居家緊急事件時，能利用電話進行有效求救。', indicators: '1. 能在模擬情境中正確撥打 119，並於 5 秒內用華語報出完整居家地址。\n2. 能清晰口述受照顧者當前意識狀態與傷勢(包含部位與症狀，如:頭流血、叫不醒)。\n3. 能在線上聽懂並正確配合 119 勤務中心人員之初步急救動作指示(如:不要移動患者)。' },
                { unit: '單元四：台華語常用詞彙與文化適應', hours: 6, method: '講述法、小組互動、影片賞析', objective: '能辨識臺灣家庭常用的基本照顧台語詞彙，降低跨文化溝通障礙。', indicators: '1. 能聽懂並正確配對 20 個常見台語照顧詞彙的華語圖卡(如:食飽未、痛、食藥仔)。\n2. 能在實境演練中，主動使用基本禮貌性客套語向雇主打招呼或表達感謝。' }
            ],
            budgetItems: [
                { id: 1, category: '人事費', name: '專案助理薪資 (負責會議紀錄/教材校對/行政試辦) 1人x3個月', amount: 105000 },
                { id: 2, category: '專家出席費', name: '職能分析/教材審查會議 (產官學勞 5人x3次x2500)', amount: 37500 },
                { id: 3, category: '講座鐘點費', name: '外聘主講師 (40小時x2000) 及 雙語助教 (40小時x1000)', amount: 120000 },
                { id: 4, category: '稿費/翻譯費', name: '講義印越語對照翻譯 (具名專業譯者，2萬字x1.2)', amount: 24000 },
                { id: 5, category: '教材與印刷費', name: '情境字卡(含刀模)與彩色講義大宗印刷 (附廠商三聯發票)', amount: 110000 },
                { id: 6, category: '多媒體製作費', name: '線上看護聽力數位影片與音檔開發 (委外發包)', amount: 550000 },
                { id: 7, category: '場地與行政費', name: '無障礙實境模擬場地租借、雙語問卷印刷、郵電', amount: 53500 },
            ]
        };

        // ------------------------------------------------------------------
        // 匯入補充資料（Gemini / ChatGPT 產生內容）解析工具
        //
        // 支援兩種輸入：
        //   1) JSON：結構符合本案資料模型（basicInfo / proposalDetails / addie /
        //      syllabus / budgetItems）者，直接對應合併。
        //   2) 文字 / Markdown：以標題段落（如「分析階段 (Analysis)」…）判斷，
        //      對應到 ADDIE 五階段與企劃章節；程式會自動略過 ``` 程式碼圍籬與
        //      ```eof 結束標記，並剔除段落之間的分隔線與說明文字。
        // 無法辨識歸類的內容不會遺失，會集中於 unmapped 供使用者選擇附加。
        // ------------------------------------------------------------------
        const PLAN_IMPORT_TARGETS = [
            { key: 'addie.analysis',            path: ['addie', 'analysis'],            label: 'ADDIE：分析階段 (Analysis)',       test: (h) => /(分析階段|Analysis)/i.test(h) },
            { key: 'addie.design',              path: ['addie', 'design'],              label: 'ADDIE：設計階段 (Design)',         test: (h) => /(設計階段|Design)/i.test(h) },
            { key: 'addie.development',         path: ['addie', 'development'],         label: 'ADDIE：發展階段 (Development)',     test: (h) => /(發展階段|Development)/i.test(h) },
            { key: 'addie.implementation',      path: ['addie', 'implementation'],      label: 'ADDIE：實施階段 (Implementation)', test: (h) => /(實施階段|Implementation)/i.test(h) },
            { key: 'addie.evaluation',          path: ['addie', 'evaluation'],          label: 'ADDIE：評估階段 (Evaluation)',     test: (h) => /(評估階段|Evaluation)/i.test(h) },
            { key: 'proposalDetails.background',    path: ['proposalDetails', 'background'],    label: '企劃：計畫緣起與背景', test: (h) => /(計畫緣起|緣起與背景|計畫背景)/.test(h) },
            { key: 'proposalDetails.objectives',    path: ['proposalDetails', 'objectives'],    label: '企劃：計畫具體目標', test: (h) => /(具體目標|計畫目標)/.test(h) },
            { key: 'proposalDetails.benefits',      path: ['proposalDetails', 'benefits'],      label: '企劃：專案預期效益', test: (h) => /(預期效益|計畫效益)/.test(h) },
            { key: 'proposalDetails.prerequisites', path: ['proposalDetails', 'prerequisites'], label: '企劃：參訓先備條件', test: (h) => /(先備條件|報名資格|參訓資格)/.test(h) },
        ];

        // ADDIE 五階段對照表：供「單檔＝單一階段」與檔名判斷使用
        // 順序即為判斷優先序（先比對到者為準）。
        const ADDIE_STAGE_TARGETS = [
            { stage: 'analysis',       path: ['addie', 'analysis'],       label: 'ADDIE：分析階段 (Analysis)',       nameRe: /(分析|analysis)/i,       headRe: /(分析階段|Analysis)/i },
            { stage: 'design',         path: ['addie', 'design'],         label: 'ADDIE：設計階段 (Design)',         nameRe: /(設計|design)/i,         headRe: /(設計階段|Design)/i },
            { stage: 'development',    path: ['addie', 'development'],     label: 'ADDIE：發展階段 (Development)',     nameRe: /(發展|development)/i,    headRe: /(發展階段|Development)/i },
            { stage: 'implementation', path: ['addie', 'implementation'], label: 'ADDIE：實施階段 (Implementation)', nameRe: /(實施|implementation)/i, headRe: /(實施階段|Implementation)/i },
            { stage: 'evaluation',     path: ['addie', 'evaluation'],     label: 'ADDIE：評估階段 (Evaluation)',     nameRe: /(評估|evaluation)/i,     headRe: /(評估階段|Evaluation)/i },
        ];

        // 依上傳檔名判斷 ADDIE 階段（容忍數字前綴／底線，如 1_分析階段_Analysis.txt）
        const detectStageFromName = (fileName) => {
            if (!fileName) return null;
            const base = String(fileName).replace(/\.[^.]+$/, ''); // 去副檔名
            return ADDIE_STAGE_TARGETS.find(t => t.nameRe.test(base)) || null;
        };

        // 依內容開頭（前若干行）判斷 ADDIE 階段：僅比對明確的「X階段 / English」字樣，避免誤判
        const detectStageFromContent = (raw) => {
            const head = String(raw).replace(/\r\n/g, '\n').split('\n').slice(0, 25).join('\n');
            return ADDIE_STAGE_TARGETS.find(t => t.headRe.test(head)) || null;
        };

        // 清理純文字內容：移除程式碼圍籬與分隔線，壓縮多餘空行
        const cleanPlainContent = (raw) => {
            const out = [];
            for (const line of String(raw).replace(/\r\n/g, '\n').split('\n')) {
                const t = line.trimEnd();
                if (/^\s*```/.test(t)) continue;            // 程式碼圍籬（含 ```eof）
                if (/^\s*-{3,}\s*$/.test(t)) continue;       // 分隔線
                out.push(line);
            }
            return out.join('\n').replace(/\n{3,}/g, '\n\n').trim();
        };

        // 解析純文字 / Markdown：依標題切段，對應到本案欄位
        const parseSupplementaryText = (raw) => {
            const lines = String(raw).replace(/\r\n/g, '\n').split('\n');
            const buffers = {};
            const order = [];
            const unmapped = [];
            let current = null;      // 目前對應欄位的 key
            let capturing = false;   // 是否正在擷取內容

            const isHeading = (l) => /^\s{0,3}#{1,6}\s+/.test(l);

            for (const line of lines) {
                const trimmed = line.trimEnd();

                // 程式碼圍籬：一律不納入內容；```eof 或單獨 ``` 視為結束擷取
                if (/^\s*```/.test(trimmed)) {
                    if (/^\s*```(eof)?\s*$/.test(trimmed)) capturing = false;
                    continue;
                }

                if (isHeading(trimmed)) {
                    const headingText = trimmed.replace(/^\s*#{1,6}\s+/, '');
                    const target = PLAN_IMPORT_TARGETS.find(t => t.test(headingText));
                    if (target) {
                        current = target.key;
                        // 重置緩衝：可丟棄「真正標題」前的說明文字（如「第二份：…」段落）
                        buffers[current] = [];
                        if (!order.some(o => o.key === current)) order.push({ key: current, label: target.label, path: target.path });
                        capturing = true;
                        continue; // 標題行本身不納入內容
                    }
                    // 非目標標題：擷取中則當內容，否則歸為未對應
                    if (capturing && current) buffers[current].push(trimmed);
                    else unmapped.push(trimmed);
                    continue;
                }

                if (capturing && current) buffers[current].push(line);
                else if (trimmed.length && !/^\s*-{3,}\s*$/.test(trimmed)) unmapped.push(line);
            }

            const fields = order
                .map(o => {
                    const value = buffers[o.key].join('\n').replace(/\n{3,}/g, '\n\n').trim();
                    return { key: o.key, path: o.path, label: o.label, value, chars: value.length, type: 'text' };
                })
                .filter(f => f.value.length > 0);

            const unmappedText = unmapped.join('\n').replace(/\n{3,}/g, '\n\n').trim();
            return { fields, unmapped: unmappedText };
        };

        // 由 JSON 物件產生預覽欄位清單
        const jsonFieldsFromObj = (obj) => {
            const fields = [];
            const groupLabel = { basicInfo: '基本資訊', proposalDetails: '企劃內容', addie: 'ADDIE' };
            ['basicInfo', 'proposalDetails'].forEach(g => {
                if (obj[g] && typeof obj[g] === 'object' && !Array.isArray(obj[g])) {
                    Object.keys(obj[g]).forEach(k => {
                        const v = obj[g][k];
                        const value = (typeof v === 'string') ? v : JSON.stringify(v);
                        fields.push({ key: g + '.' + k, path: [g, k], label: groupLabel[g] + '：' + k, value, chars: String(value).length, type: 'text' });
                    });
                }
            });
            // ADDIE：階段值可能是舊版字串或新版結構物件
            if (obj.addie && typeof obj.addie === 'object' && !Array.isArray(obj.addie)) {
                Object.keys(obj.addie).forEach(k => {
                    const v = obj.addie[k];
                    const stageLabel = (ADDIE_SCHEMA[k] && ADDIE_SCHEMA[k].label) || k;
                    if (typeof v === 'string') {
                        fields.push({ key: 'addie.' + k, path: ['addie', k], label: 'ADDIE：' + stageLabel, value: v, chars: v.length, type: 'text' });
                    } else if (v && typeof v === 'object') {
                        const preview = String(v.narrative || JSON.stringify(v));
                        fields.push({ key: 'addie.' + k, path: ['addie', k], label: 'ADDIE：' + stageLabel + '（結構化）', value: preview, chars: preview.length, type: 'addieStage', raw: v });
                    }
                });
            }
            if (Array.isArray(obj.syllabus)) fields.push({ key: 'syllabus', path: ['syllabus'], label: '課程大綱 (syllabus)', value: JSON.stringify(obj.syllabus, null, 2), chars: obj.syllabus.length, type: 'array' });
            if (Array.isArray(obj.budgetItems)) fields.push({ key: 'budgetItems', path: ['budgetItems'], label: '經費項目 (budgetItems)', value: JSON.stringify(obj.budgetItems, null, 2), chars: obj.budgetItems.length, type: 'array' });
            return fields;
        };

        // 主解析入口：先試 JSON，失敗再走文字 / Markdown
        // fileName（可選）：用於「單檔＝單一 ADDIE 階段」的檔名判斷。
        const parseSupplementary = (raw, fileName) => {
            const text = String(raw).trim();
            let jsonText = text;
            const fenceJson = text.match(/```json\s*([\s\S]*?)```/i);
            if (fenceJson) jsonText = fenceJson[1].trim();
            if (jsonText.startsWith('{')) {
                try {
                    const obj = JSON.parse(jsonText);
                    if (obj && typeof obj === 'object') {
                        return { isJson: true, json: obj, fields: jsonFieldsFromObj(obj), unmapped: '' };
                    }
                } catch (e) { /* 非合法 JSON，改走文字解析 */ }
            }
            const { fields, unmapped } = parseSupplementaryText(text);
            // 若有標題可對應（舊版單檔多段格式）→ 沿用既有結果
            if (fields.length > 0) return { isJson: false, json: null, fields, unmapped };

            // 沒有任何可對應標題：嘗試「整份檔案 ＝ 單一 ADDIE 階段」
            // 判斷優先序：檔名 → 內容開頭字樣
            const stage = detectStageFromName(fileName) || detectStageFromContent(text);
            if (stage) {
                const value = cleanPlainContent(text);
                if (value.length > 0) {
                    return {
                        isJson: false, json: null,
                        fields: [{ key: stage.path.join('.'), path: stage.path, label: stage.label, value, chars: value.length, type: 'text' }],
                        unmapped: '',
                    };
                }
            }
            return { isJson: false, json: null, fields, unmapped };
        };

        // 多檔匯入：逐檔以檔名判斷 ADDIE 階段後合併；同一階段內容自動接續（append）
        const parseSupplementaryFiles = (files) => {
            const byKey = {};      // key -> field
            const order = [];      // 保留出現順序
            const unmappedParts = [];
            (files || []).forEach(f => {
                const r = parseSupplementary(f.text, f.name);
                if (r.fields && r.fields.length) {
                    r.fields.forEach(fld => {
                        if (fld.type !== 'text') return; // 多檔匯入僅處理文字欄位
                        if (byKey[fld.key]) {
                            byKey[fld.key].value = (byKey[fld.key].value + '\n\n' + fld.value).trim();
                            byKey[fld.key].chars = byKey[fld.key].value.length;
                        } else {
                            byKey[fld.key] = { ...fld };
                            order.push(fld.key);
                        }
                    });
                }
                if (r.unmapped) unmappedParts.push('【' + (f.name || '未命名檔案') + '】\n' + r.unmapped);
            });
            const fields = order.map(k => byKey[k]);
            const unmapped = unmappedParts.join('\n\n').replace(/\n{3,}/g, '\n\n').trim();
            return { isJson: false, json: null, fields, unmapped };
        };

        // 合併文字：append 附加（保留原內容）/ replace 覆蓋
        const mergeText = (existing, incoming, mode) => {
            const inc = (incoming == null ? '' : String(incoming)).trim();
            if (mode === 'replace') return inc;
            const ex = (existing == null ? '' : String(existing));
            if (!ex.trim()) return inc;
            if (!inc) return ex;
            return ex.trimEnd() + '\n\n' + inc;
        };

        // 對應品質指標標籤（indicator id + 短標題），關鍵指標以紅點標示
        const IndicatorTag = ({ id }) => {
            const ind = RUBRIC_INDICATORS[id];
            if (!ind) return null;
            return (
                <span title={ind.dim + '｜' + (ind.critical ? '關鍵指標' : '一般指標')} className="inline-flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-200 align-middle">
                    <i className="fa-solid fa-tag text-[9px]"></i>
                    對應：{ind.dim} 指標 {id}　{ind.title}
                    {ind.critical && <span className="w-1.5 h-1.5 rounded-full bg-rose-500" title="關鍵指標"></span>}
                </span>
            );
        };
        const RequiredBadge = ({ required }) => (
            required
                ? <span className="text-[11px] font-bold px-1.5 py-0.5 rounded bg-rose-100 text-rose-700 border border-rose-200">必填</span>
                : <span className="text-[11px] font-medium px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 border border-gray-200">選填</span>
        );

        const IcapGenerator = () => {
            const [activeTab, setActiveTab] = useState('basic');
            const [basicInfo, setBasicInfo] = useState(DEFAULT_DATA.basicInfo);
            const [proposalDetails, setProposalDetails] = useState(DEFAULT_DATA.proposalDetails);
            const [addie, setAddie] = useState(DEFAULT_DATA.addie);
            const [syllabus, setSyllabus] = useState(DEFAULT_DATA.syllabus);
            const [budgetItems, setBudgetItems] = useState(DEFAULT_DATA.budgetItems);
            const [checklist, setChecklist] = useState({
                ttqs: true, experts: true, bilingual: true, noEquipment: true, rubric: true, independentAcc: false
            });

            // 匯入補充資料（Gemini / ChatGPT）狀態
            const [showImport, setShowImport] = useState(false);
            const [importText, setImportText] = useState('');
            const [importFileName, setImportFileName] = useState('');
            const [importFiles, setImportFiles] = useState([]); // 多檔匯入：[{ name, text }]
            const [importMode, setImportMode] = useState('append'); // append | replace
            const [parseResult, setParseResult] = useState(null);
            const [importSelected, setImportSelected] = useState({});
            const [includeUnmapped, setIncludeUnmapped] = useState(true);

            // 雲端連線狀態（直接連線 GAS；不再降級為離線單機模式）
            const [savedVersions, setSavedVersions] = useState([]);
            const [versionName, setVersionName] = useState('');
            const [connStatus, setConnStatus] = useState({ loading: true, message: '正在直接連線 Google Sheet 雲端資料庫...', error: false });

            // 直接連線載入雲端版本清單（失敗時明確顯示錯誤並提供重試，不切換離線）
            const loadVersions = () => {
                setConnStatus({ loading: true, message: '正在直接連線 Google Sheet 雲端資料庫...', error: false });
                callGas({ action: 'load' })
                    .then(data => {
                        setSavedVersions(data.versions || []);
                        setConnStatus({ loading: false, message: `已直接連線雲端資料庫，載入 ${(data.versions || []).length} 個版本`, error: false });
                    })
                    .catch(err => {
                        console.error('GAS 連線錯誤:', err);
                        setConnStatus({ loading: false, message: '雲端連線失敗：' + err.message + '。請確認 GAS 部署網址與網路後重試。', error: true });
                    });
            };

            useEffect(() => { loadVersions(); }, []);

            // 變更 GAS 部署網址（存入 localStorage 後重新載入）
            const changeApiUrl = () => {
                const next = window.prompt('請輸入 GAS 部署網址（Web App /exec URL）：', GAS_API_URL);
                if (next && next.trim()) {
                    window.localStorage.setItem('gasApiUrl', next.trim());
                    window.location.reload();
                }
            };

            // 測試連線：以 GET 直接打 GAS /exec，回報是否為正常 JSON、登入頁或缺 doPost
            const testConnection = () => {
                setConnStatus({ loading: true, message: '測試連線中（GET ' + GAS_API_URL + '）...', error: false });
                fetch(GAS_API_URL, { method: 'GET', redirect: 'follow' })
                    .then(res => res.text().then(text => ({ status: res.status, text: text })))
                    .then(({ status, text }) => {
                        try {
                            const j = JSON.parse(text);
                            const ok = !!(j && (j.status === 'ok' || j.versions !== undefined));
                            setConnStatus({ loading: false, message: ok ? ('連線正常，後端回應：' + text.slice(0, 120)) : ('已連到後端，但回應非預期：' + text.slice(0, 120)), error: !ok });
                        } catch (e) {
                            let msg;
                            if (/doPost|指令碼函式/.test(text)) msg = '連到 GAS，但部署缺 doPost 或為舊版：請貼上最新 Code.gs 並重新部署。';
                            else if (/accounts\.google\.com|ServiceLogin|需要授權|請登入/i.test(text)) msg = '被導向登入頁：部署權限不是「任何人」，請修改後重新部署。';
                            else msg = '連到網址但回應非 JSON（可能是別的網頁應用）。HTTP ' + status;
                            setConnStatus({ loading: false, message: msg, error: true });
                        }
                    })
                    .catch(err => {
                        setConnStatus({ loading: false, message: '測試連線失敗（' + err.message + '）。將在新分頁開啟該網址供你檢視；若以 file:// 開啟，請改用 http://localhost:8000/ 。', error: true });
                        window.open(GAS_API_URL, '_blank');
                    });
            };

            // 儲存至 Google Sheet（直接連線；不再阻擋離線）
            const saveCurrentVersion = () => {
                if (!versionName.trim()) { alert('請輸入版本名稱！'); return; }
                setConnStatus({ loading: true, message: '資料寫入 Google Sheet 中...', error: false });

                const currentData = { basicInfo, proposalDetails, addie, syllabus, budgetItems };

                callGas({ action: 'save', name: versionName, data: currentData })
                    .then(data => {
                        setSavedVersions(data.versions || []);
                        const savedName = versionName;
                        setVersionName('');
                        setConnStatus({ loading: false, message: '儲存成功！資料已同步至 Google Sheet。', error: false });
                        alert(`版本「${savedName}」已安全儲存至雲端！`);
                    })
                    .catch(err => {
                        setConnStatus({ loading: false, message: '儲存失敗：' + err.message, error: true });
                        alert('儲存失敗！請確認 GAS 部署網址與後端程式碼。錯誤：' + err.message);
                    });
            };

            // 從雲端載入歷史版本
            const loadVersion = (version) => {
                if (window.confirm(`確定要從雲端載入 [${version.name}] 嗎？這將覆蓋當前畫面。`)) {
                    const d = version.data || {};
                    setBasicInfo(d.basicInfo || DEFAULT_DATA.basicInfo);
                    setProposalDetails(d.proposalDetails || DEFAULT_DATA.proposalDetails);
                    setAddie(normalizeAddie(d.addie)); // 相容舊版字串型 addie
                    setSyllabus(Array.isArray(d.syllabus) ? d.syllabus : DEFAULT_DATA.syllabus);
                    setBudgetItems(Array.isArray(d.budgetItems) ? d.budgetItems : DEFAULT_DATA.budgetItems);
                    setConnStatus({ loading: false, message: `已載入版本：${version.name}`, error: false });
                }
            };

            // 從雲端刪除歷史版本
            const deleteVersion = (id, name, e) => {
                e.stopPropagation();
                if (window.confirm(`確定要從雲端永久刪除版本 [${name}] 嗎？`)) {
                    setConnStatus({ loading: true, message: '資料刪除中...', error: false });
                    callGas({ action: 'delete', id: id })
                        .then(data => {
                            setSavedVersions(data.versions || []);
                            setConnStatus({ loading: false, message: '刪除成功', error: false });
                        })
                        .catch(err => setConnStatus({ loading: false, message: '刪除失敗：' + err.message, error: true }));
                }
            };

            // 經費自動核算邏輯
            const budgetCalc = useMemo(() => {
                const total = budgetItems.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                const subsidy = Math.min(total * 0.7, 1000000);
                const selfFund = total - subsidy;
                const personnelTotal = budgetItems.filter(i => i.category === '人事費').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                const personnelRatio = total > 0 ? (personnelTotal / total) : 0;
                const isPersonnelValid = personnelRatio <= (1/3);
                return { total, subsidy, selfFund, personnelTotal, personnelRatio, isPersonnelValid };
            }, [budgetItems]);

            // 表單操作處理
            const handleBudgetChange = (id, field, value) => {
                setBudgetItems(budgetItems.map(item => item.id === id ? { ...item, [field]: field === 'amount' ? Number(value) : value } : item));
            };
            const addBudgetItem = () => {
                const newId = budgetItems.length > 0 ? Math.max(...budgetItems.map(i => i.id)) + 1 : 1;
                setBudgetItems([...budgetItems, { id: newId, category: '其他費', name: '新增項目', amount: 0 }]);
            };
            const removeBudgetItem = (id) => setBudgetItems(budgetItems.filter(item => item.id !== id));
            const handleSyllabusChange = (index, field, value) => {
                const updated = [...syllabus]; updated[index][field] = value; setSyllabus(updated);
            };

            // ---- ADDIE 結構化欄位／對照表編輯 ----
            const setAddieField = (stage, key, value) => {
                setAddie(prev => ({ ...prev, [stage]: { ...prev[stage], [key]: value } }));
            };
            const setAddieCell = (stage, tableKey, rowIdx, colKey, value) => {
                setAddie(prev => {
                    const rows = (prev[stage][tableKey] || []).map((r, i) => i === rowIdx ? { ...r, [colKey]: value } : r);
                    return { ...prev, [stage]: { ...prev[stage], [tableKey]: rows } };
                });
            };
            const addAddieRow = (stage, table) => {
                setAddie(prev => {
                    const row = {}; table.columns.forEach(c => { row[c.key] = ''; });
                    return { ...prev, [stage]: { ...prev[stage], [table.key]: [...(prev[stage][table.key] || []), row] } };
                });
            };
            const removeAddieRow = (stage, tableKey, rowIdx) => {
                setAddie(prev => ({ ...prev, [stage]: { ...prev[stage], [tableKey]: (prev[stage][tableKey] || []).filter((_, i) => i !== rowIdx) } }));
            };

            // 某對照表是否已填（至少一列、且該列任一欄有值）
            const tableFilled = (rows) => Array.isArray(rows) && rows.some(r => Object.values(r).some(v => String(v || '').trim()));

            // 單一階段完成度：必填欄位 + 必填對照表（分母僅計必填項）
            const stageCompleteness = (stageKey) => {
                const schema = ADDIE_SCHEMA[stageKey];
                const st = addie[stageKey] || emptyStage(stageKey);
                let total = 0, filled = 0; const missing = [];
                schema.fields.forEach(f => {
                    if (!f.required) return;
                    total += 1;
                    if (String(st[f.key] || '').trim()) filled += 1; else missing.push(f.label);
                });
                schema.tables.forEach(t => {
                    if (!t.required) return;
                    total += 1;
                    if (tableFilled(st[t.key])) filled += 1; else missing.push(t.label);
                });
                return { total, filled, pct: total ? Math.round(filled / total * 100) : 100, missing };
            };
            const overallCompleteness = useMemo(() => {
                let total = 0, filled = 0;
                ADDIE_STAGE_KEYS.forEach(k => { const c = stageCompleteness(k); total += c.total; filled += c.filled; });
                return { total, filled, pct: total ? Math.round(filled / total * 100) : 100 };
            }, [addie]);

            // 實施排程總時數（呼應指標 I-3：課程總時數 ≥ 12 小時）
            const scheduleHours = useMemo(() => {
                const rows = (addie.implementation && addie.implementation.scheduleTable) || [];
                return rows.reduce((s, r) => s + (Number(String(r.hours).replace(/[^0-9.]/g, '')) || 0), 0);
            }, [addie]);

            // 標竿範例：可展開的欄位／階段面板開關
            const [benchmarkOpen, setBenchmarkOpen] = useState({});
            const toggleBenchmark = (id) => setBenchmarkOpen(prev => ({ ...prev, [id]: !prev[id] }));
            const hasExemplar = Object.keys(EXEMPLAR).length > 0;

            // 一鍵填入標竿範例（非破壞性：預設只填空白欄位；若已有內容詢問是否覆蓋）
            const fillBenchmark = () => {
                if (!hasExemplar) { alert('找不到標竿範例資料（exemplar.js 未載入）。'); return; }
                const hasAny = ADDIE_STAGE_KEYS.some(k => {
                    const st = addie[k] || {};
                    return Object.keys(st).some(f => Array.isArray(st[f]) ? tableFilled(st[f]) : String(st[f] || '').trim());
                });
                let overwrite = false;
                if (hasAny) {
                    overwrite = window.confirm('目前 ADDIE 已有內容。\n\n按「確定」＝以標竿範例「覆蓋」全部 ADDIE 欄位；\n按「取消」＝僅填入目前「空白」的欄位（保留你已寫的內容）。');
                }
                setAddie(prev => {
                    const next = { ...prev };
                    ADDIE_STAGE_KEYS.forEach(stage => {
                        const ex = exemplarStage(stage);
                        const cur = { ...(prev[stage] || emptyStage(stage)) };
                        Object.keys(ex).forEach(field => {
                            if (Array.isArray(ex[field])) {
                                const curFilled = tableFilled(cur[field]);
                                if (overwrite || !curFilled) cur[field] = ex[field].map(r => ({ ...r }));
                            } else {
                                if (overwrite || !String(cur[field] || '').trim()) cur[field] = ex[field];
                            }
                        });
                        next[stage] = cur;
                    });
                    return next;
                });
                setConnStatus({ loading: false, message: '已填入「標竿 100 分範例」（' + (overwrite ? '覆蓋模式' : '僅補空白') + '）。此為示範內容，請依貴案實況修改後再儲存。', error: false });
            };

            // 匯入補充資料：載入檔案（支援一次選取多個檔案，例如 ADDIE 五階段各一檔）
            const handleImportFile = (e) => {
                const files = Array.from(e.target.files || []);
                if (!files.length) return;
                Promise.all(files.map(file => new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => resolve({ name: file.name, text: String(ev.target.result || '') });
                    reader.readAsText(file, 'utf-8');
                }))).then(loaded => {
                    setImportFiles(loaded);
                    // 單檔時同步顯示於文字框，方便微調；多檔時清空文字框改走檔案解析
                    if (loaded.length === 1) setImportText(loaded[0].text);
                    else setImportText('');
                    setImportFileName(loaded.map(f => f.name).join('、'));
                    setParseResult(null);
                });
                e.target.value = ''; // 允許重複選取相同檔案
            };

            // 匯入補充資料：解析並預覽
            const handleParseImport = () => {
                let result;
                if (importFiles.length > 1) {
                    // 多檔：逐檔以檔名判斷階段後合併
                    result = parseSupplementaryFiles(importFiles);
                } else if (importFiles.length === 1) {
                    // 單檔：以（可能微調過的）文字內容 + 檔名判斷階段
                    const text = (importText.trim() || importFiles[0].text);
                    if (!text) { alert('請先貼上或上傳補充資料內容。'); return; }
                    result = parseSupplementary(text, importFiles[0].name);
                } else {
                    // 純貼上：無檔名，靠內容標題／開頭字樣判斷
                    const text = importText.trim();
                    if (!text) { alert('請先貼上或上傳補充資料內容。'); return; }
                    result = parseSupplementary(text, importFileName);
                }
                if (result.fields.length === 0 && !result.unmapped) {
                    alert('無法從內容中辨識出可對應的段落，請確認格式（建議含「分析階段」等標題、以階段命名的檔案，或提供符合資料模型的 JSON）。');
                }
                const sel = {};
                result.fields.forEach(f => { sel[f.key] = true; });
                setImportSelected(sel);
                setIncludeUnmapped(!!result.unmapped);
                setParseResult(result);
            };

            // 匯入補充資料：套用合併至本案
            const applyImport = () => {
                if (!parseResult) return;
                const mode = importMode;
                const chosen = parseResult.fields.filter(f => importSelected[f.key] !== false);
                const upd = { basicInfo: {}, proposalDetails: {}, addie: {}, addieStages: {}, syllabus: null, budgetItems: null };
                chosen.forEach(f => {
                    if (f.type === 'array') {
                        if (f.path[0] === 'syllabus' && parseResult.json) upd.syllabus = parseResult.json.syllabus;
                        if (f.path[0] === 'budgetItems' && parseResult.json) upd.budgetItems = parseResult.json.budgetItems;
                        return;
                    }
                    if (f.type === 'addieStage') { upd.addieStages[f.path[1]] = f.raw; return; }
                    const [group, key] = f.path;
                    if (group === 'addie') { upd.addie[key] = f.value; return; } // 文字 → 併入該階段 narrative
                    if (upd[group]) upd[group][key] = f.value;
                });

                if (Object.keys(upd.addie).length || Object.keys(upd.addieStages).length) {
                    setAddie(prev => {
                        const next = { ...prev };
                        // 純文字階段：併入 narrative（保留既有結構化欄位）
                        Object.keys(upd.addie).forEach(k => {
                            const stage = { ...(next[k] || emptyStage(k)) };
                            stage.narrative = mergeText(stage.narrative, upd.addie[k], mode);
                            next[k] = stage;
                        });
                        // 結構化階段（來自符合資料模型的 JSON）：逐欄位合併
                        Object.keys(upd.addieStages).forEach(k => {
                            const raw = upd.addieStages[k] || {};
                            const stage = { ...(next[k] || emptyStage(k)) };
                            Object.keys(stage).forEach(field => {
                                if (raw[field] == null) return;
                                if (Array.isArray(stage[field])) { if (Array.isArray(raw[field])) stage[field] = raw[field]; }
                                else stage[field] = mergeText(stage[field], raw[field], mode);
                            });
                            next[k] = stage;
                        });
                        return next;
                    });
                }
                if (Object.keys(upd.basicInfo).length) {
                    // 基本資訊多為短欄位，一律以匯入值覆蓋
                    setBasicInfo(prev => ({ ...prev, ...upd.basicInfo }));
                }
                const unmappedText = (includeUnmapped && parseResult.unmapped) ? parseResult.unmapped : '';
                if (Object.keys(upd.proposalDetails).length || unmappedText) {
                    setProposalDetails(prev => {
                        const next = { ...prev };
                        Object.keys(upd.proposalDetails).forEach(k => { next[k] = mergeText(prev[k], upd.proposalDetails[k], mode); });
                        if (unmappedText) {
                            next.background = mergeText(next.background, '【匯入補充資料（未分類）】\n' + unmappedText, 'append');
                        }
                        return next;
                    });
                }
                if (upd.syllabus) setSyllabus(upd.syllabus);
                if (upd.budgetItems) setBudgetItems(upd.budgetItems);

                const count = chosen.length + (unmappedText ? 1 : 0);
                setShowImport(false);
                setParseResult(null);
                setImportText('');
                setImportFileName('');
                setImportFiles([]);
                setConnStatus({ loading: false, message: `已匯入 ${count} 項補充資料至本案（尚未儲存）。請確認內容後於上方「寫入資料庫」同步至 Google Sheet。`, error: false });
            };

            // 自訂 Tab 按鈕元件
            const TabButton = ({ id, iconClass, label }) => (
                <button onClick={() => setActiveTab(id)} className={`flex items-center space-x-2 px-5 py-4 text-sm font-semibold transition-all border-b-2 whitespace-nowrap ${activeTab === id ? 'border-blue-600 text-blue-700 bg-blue-50/50' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>
                    <i className={`${iconClass} w-4 h-4`}></i><span>{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto space-y-6">

                        {/* 標頭儀表板 */}
                        <div className="bg-white rounded-xl shadow-md p-6 border border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 no-print">
                            <div>
                                <h1 className="text-2xl font-black text-gray-900 flex items-center gap-3">
                                    <i className="fa-brands fa-react text-blue-500 animate-spin" style={{animationDuration: '4s'}}></i>
                                    <span>{PROJECT_NAME}</span> <span className="text-sm px-2 py-1 rounded-lg ml-2 font-bold border bg-emerald-100 text-emerald-700 border-emerald-300">雲端直連版</span>
                                </h1>
                                <p className="text-gray-500 mt-1.5 text-sm font-medium">直接連線 Google Apps Script，計畫書內容存於 Google Sheet；含完整防呆與主計核銷邏輯</p>
                            </div>
                            <div className="flex items-center gap-3 shrink-0">
                                <button onClick={() => setShowImport(true)} className="text-sm font-bold px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 text-white shadow-sm transition flex items-center gap-2">
                                    <i className="fa-solid fa-file-import"></i> 匯入補充資料 (Gemini/ChatGPT)
                                </button>
                                <button onClick={testConnection} className="text-xs text-gray-400 hover:text-emerald-600 transition flex items-center gap-1.5">
                                    <i className="fa-solid fa-plug-circle-check"></i> 測試連線
                                </button>
                                <button onClick={changeApiUrl} className="text-xs text-gray-400 hover:text-blue-600 transition flex items-center gap-1.5">
                                    <i className="fa-solid fa-link"></i> 變更連線網址
                                </button>
                            </div>
                        </div>

                        {/* 雲端儲存與狀態面板 */}
                        <div className="bg-gradient-to-r from-slate-900 to-blue-950 text-white rounded-xl p-6 shadow-md border border-slate-800 no-print">
                            <div className="flex flex-col md:flex-row gap-6">
                                <div className="flex-1 space-y-4">
                                    <h3 className="text-md font-bold flex items-center gap-2 text-blue-300">
                                        <i className="fa-solid fa-server"></i> Google Sheet 即時備份庫（直接連線）
                                    </h3>
                                    <div className="flex items-center gap-2 text-sm">
                                        {connStatus.loading ? <i className="fa-solid fa-circle-notch fa-spin text-amber-400"></i> : <i className={`fa-solid ${connStatus.error ? 'fa-triangle-exclamation text-rose-400' : 'fa-wifi text-emerald-400'}`}></i>}
                                        <span className={connStatus.loading ? 'text-amber-200' : (connStatus.error ? 'text-rose-200' : 'text-emerald-200')}>{connStatus.message}</span>
                                        {connStatus.error && !connStatus.loading && (
                                            <button onClick={loadVersions} className="ml-2 text-xs bg-white/10 hover:bg-white/20 border border-white/20 rounded px-2 py-1 font-bold transition">重新連線</button>
                                        )}
                                    </div>
                                    <div className="flex gap-2">

                                            {importFiles.map((f, i) => {
                                                const st = detectStageFromName(f.name);
                                                return <div key={i} className="font-mono">• {f.name} → {st ? st.label : '（無法由檔名判斷，將依內容解析）'}</div>;
                                            })}
                                        </div>
                                    </div>
                                ) : (
                                <textarea rows={8} value={importText} onChange={e => { setImportText(e.target.value); setParseResult(null); }} placeholder="在此貼上 Gemini / ChatGPT 產生的內容（Markdown 段落或符合資料模型的 JSON 皆可）..." className="w-full p-3 border rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none custom-scrollbar" />
                                )}
                                <div className="flex flex-wrap gap-4 items-center">
                                    <button onClick={handleParseImport} className="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold rounded-lg transition"><i className="fa-solid fa-magnifying-glass mr-1"></i> 解析預覽</button>
                                    <div className="flex items-center gap-3 text-sm text-gray-600">
                                        <span className="font-semibold">合併方式：</span>
                                        <label className="inline-flex items-center gap-1.5 cursor-pointer"><input type="radio" name="importMode" checked={importMode === 'append'} onChange={() => setImportMode('append')} /> 附加於現有內容</label>
                                        <label className="inline-flex items-center gap-1.5 cursor-pointer"><input type="radio" name="importMode" checked={importMode === 'replace'} onChange={() => setImportMode('replace')} /> 覆蓋現有內容</label>
                                    </div>
                                </div>

                                {parseResult && (
                                <div className="border rounded-xl p-4 bg-gray-50 space-y-3">
                                    <div className="text-sm font-bold text-gray-700 flex items-center gap-2">
                                        <i className={`fa-solid ${parseResult.isJson ? 'fa-code text-blue-600' : 'fa-align-left text-emerald-600'}`}></i>
                                        解析結果 {parseResult.isJson ? '（偵測為 JSON 結構，直接對應資料模型）' : '（偵測為文字／Markdown 段落）'}：可對應 {parseResult.fields.length} 個欄位
                                    </div>
                                    {parseResult.fields.length > 0 ? (
                                    <div className="space-y-2 max-h-72 overflow-y-auto custom-scrollbar pr-1">
                                        {parseResult.fields.map(f => (
                                        <label key={f.key} className="flex items-start gap-2 bg-white border border-gray-200 rounded-lg p-3 cursor-pointer hover:border-purple-300 transition">
                                            <input type="checkbox" className="mt-1" checked={importSelected[f.key] !== false} onChange={e => setImportSelected({ ...importSelected, [f.key]: e.target.checked })} />
                                            <div className="flex-1 min-w-0">
                                                <div className="text-sm font-semibold text-gray-800">{f.label} <span className="text-xs font-normal text-gray-400">（{f.type === 'array' ? f.chars + ' 筆' : f.chars + ' 字'}）</span></div>
                                                <div className="text-xs text-gray-500 mt-1 whitespace-pre-line break-words">{String(f.value).slice(0, 160)}{String(f.value).length > 160 ? '…' : ''}</div>
                                            </div>
                                        </label>
                                        ))}
                                    </div>
                                    ) : <div className="text-sm text-amber-600">未辨識出可直接對應的段落，請確認格式或改用 JSON。</div>}

                                    {parseResult.unmapped && (
                                    <label className="flex items-start gap-2 bg-amber-50 border border-amber-200 rounded-lg p-3 cursor-pointer">
                                        <input type="checkbox" className="mt-1" checked={includeUnmapped} onChange={e => setIncludeUnmapped(e.target.checked)} />
                                        <div className="flex-1 min-w-0">
                                            <div className="text-sm font-semibold text-amber-800">未能對應的內容（勾選後將附加至「計畫緣起與背景」欄位，避免遺失）</div>
                                            <div className="text-xs text-amber-700/80 mt-1 whitespace-pre-line break-words">{parseResult.unmapped.slice(0, 200)}{parseResult.unmapped.length > 200 ? '…' : ''}</div>
                                        </div>
                                    </label>
                                    )}

                                    <div className="flex justify-end gap-2 pt-2 border-t border-gray-200">
                                        <button onClick={() => setShowImport(false)} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-200 rounded-lg transition">取消</button>
                                        <button onClick={applyImport} className="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold rounded-lg transition"><i className="fa-solid fa-check mr-1"></i> 確認匯入本案</button>
                                    </div>
                                </div>
                                )}
                            </div>
                        </div>
                    </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IcapGenerator />);
    </script>
</body>
</html>
